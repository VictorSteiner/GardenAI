# Home Assistant package: clean workflow to select one sensor and assign a plant/seed/room.

rest_command:
  save_selected_sensor_configuration:
    # Replace host if needed (e.g. http://192.168.1.10:5064) when host.docker.internal is unavailable.
    url: "http://host.docker.internal:5064/api/garden/pots/{{ pot_id }}/configuration"
    method: post
    content_type: "application/json"
    payload: >-
      {
        "roomAreaId": "{{ room_area_id }}",
        "roomName": "{{ room_name }}",
        "seeds": [
          {
            "plantName": "{{ plant_name }}",
            "seedName": "{{ seed_name }}",
            "plantedDate": "{{ planted_date }}",
            "expectedHarvestDate": {{ ('"' ~ expected_harvest_date ~ '"') if expected_harvest_date | length > 0 else 'null' }},
            "status": "{{ status }}",
            "notes": {{ ('"' ~ notes ~ '"') if notes | length > 0 else 'null' }}
          }
        ]
      }

input_select:
  garden_selected_sensor:
    name: "Garden Selected Sensor"
    options:
      - mock_pot_1
      - mock_pot_2
      - mock_pot_3
      - mock_pot_4
      - mock_pot_5
      - mock_pot_6
    initial: "mock_pot_1"

  garden_room_area_id:
    name: "Garden Room"
    options:
      - living_room
      - balcony
      - greenhouse
    initial: "living_room"

  garden_seed_status:
    name: "Seed Status"
    options:
      - growing
      - mature
      - harvested
      - removed
    initial: "growing"

  garden_plant_name:
    name: "Plant Name"
    options:
      - Tomato
      - Basil
      - Pepper
      - Lettuce
      - Cucumber
      - Parsley
    initial: "Tomato"

  garden_seed_name:
    name: "Seed Name"
    options:
      - Moneymaker
      - Genovese
      - California Wonder
      - Buttercrunch
      - Marketmore
      - Italian Giant
    initial: "Moneymaker"

input_text:
  garden_new_plant_name:
    name: "Add New Plant Option"
    initial: ""
  garden_new_seed_name:
    name: "Add New Seed Option"
    initial: ""
  garden_assignment_notes:
    name: "Garden Assignment Notes"
    initial: ""
  garden_seeds_tomato:
    name: "Seed Catalog Tomato"
    initial: "Moneymaker,San Marzano,Cherry"
  garden_seeds_basil:
    name: "Seed Catalog Basil"
    initial: "Genovese,Sweet Basil,Thai Basil"
  garden_seeds_pepper:
    name: "Seed Catalog Pepper"
    initial: "California Wonder,Jalapeno,Cayenne"
  garden_seeds_lettuce:
    name: "Seed Catalog Lettuce"
    initial: "Buttercrunch,Romaine,Iceberg"
  garden_seeds_cucumber:
    name: "Seed Catalog Cucumber"
    initial: "Marketmore,Telegraph,Persian"
  garden_seeds_parsley:
    name: "Seed Catalog Parsley"
    initial: "Italian Giant,Curled"

input_datetime:
  garden_planted_date:
    name: "Planted Date"
    has_date: true
    has_time: false
  garden_expected_harvest_date:
    name: "Expected Harvest Date"
    has_date: true
    has_time: false

input_boolean:
  garden_use_expected_harvest:
    name: "Use Expected Harvest Date"
    initial: false

script:
  save_selected_sensor_assignment:
    alias: "Save Selected Sensor Assignment"
    variables:
      selected_sensor: "{{ states('input_select.garden_selected_sensor') }}"
      room_area_id: "{{ states('input_select.garden_room_area_id') }}"
      status: "{{ states('input_select.garden_seed_status') }}"
      plant_name: "{{ states('input_select.garden_plant_name') }}"
      seed_name: "{{ states('input_select.garden_seed_name') }}"
      planted_date: "{{ states('input_datetime.garden_planted_date') ~ 'T00:00:00Z' }}"
      expected_harvest_date: "{{ (states('input_datetime.garden_expected_harvest_date') ~ 'T00:00:00Z') if is_state('input_boolean.garden_use_expected_harvest', 'on') else '' }}"
      notes: "{{ states('input_text.garden_assignment_notes') }}"
      pot_id: >-
        {% set map = {
          'mock_pot_1':'11111111-1111-1111-1111-111111111111',
          'mock_pot_2':'22222222-2222-2222-2222-222222222222',
          'mock_pot_3':'33333333-3333-3333-3333-333333333333',
          'mock_pot_4':'44444444-4444-4444-4444-444444444444',
          'mock_pot_5':'55555555-5555-5555-5555-555555555555',
          'mock_pot_6':'66666666-6666-6666-6666-666666666666'
        } %}
        {{ map[selected_sensor] if selected_sensor in map else '' }}
      room_name: >-
        {% set map = {
          'living_room':'Living Room',
          'balcony':'Balcony',
          'greenhouse':'Greenhouse'
        } %}
        {{ map[room_area_id] if room_area_id in map else room_area_id }}
    sequence:
      - choose:
          - conditions: "{{ plant_name | length == 0 or seed_name | length == 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Garden Assignment"
                  message: "Plant name and seed name are required."
        default:
          - service: rest_command.save_selected_sensor_configuration
            data:
              pot_id: "{{ pot_id }}"
              room_area_id: "{{ room_area_id }}"
              room_name: "{{ room_name }}"
              plant_name: "{{ plant_name }}"
              seed_name: "{{ seed_name }}"
              planted_date: "{{ planted_date if planted_date | length > 0 else now().isoformat() }}"
              expected_harvest_date: "{{ expected_harvest_date }}"
              status: "{{ status }}"
              notes: "{{ notes }}"
          - service: persistent_notification.create
            data:
              title: "Garden Assignment"
              message: >-
                Saved assignment for {{ selected_sensor }} -> {{ plant_name }} ({{ seed_name }}) in {{ room_name }}.
    mode: single

  clear_selected_sensor_form:
    alias: "Clear Selected Sensor Form"
    sequence:
      - service: input_text.set_value
        target:
          entity_id:
            - input_text.garden_new_plant_name
            - input_text.garden_new_seed_name
            - input_text.garden_assignment_notes
        data:
          value: ""
      - service: input_select.select_option
        target:
          entity_id: input_select.garden_seed_status
        data:
          option: "growing"
      - service: input_select.select_option
        target:
          entity_id: input_select.garden_plant_name
        data:
          option: "Tomato"
      - service: input_select.select_option
        target:
          entity_id: input_select.garden_seed_name
        data:
          option: "Moneymaker"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.garden_use_expected_harvest
      - service: input_datetime.set_datetime
        target:
          entity_id:
            - input_datetime.garden_planted_date
            - input_datetime.garden_expected_harvest_date
        data:
          date: "{{ now().strftime('%Y-%m-%d') }}"
    mode: single

  refresh_seed_options_for_selected_plant:
    alias: "Refresh Seed Options For Selected Plant"
    sequence:
      - variables:
          plant: "{{ states('input_select.garden_plant_name') }}"
          csv: >-
            {% if plant == 'Tomato' %}{{ states('input_text.garden_seeds_tomato') }}
            {% elif plant == 'Basil' %}{{ states('input_text.garden_seeds_basil') }}
            {% elif plant == 'Pepper' %}{{ states('input_text.garden_seeds_pepper') }}
            {% elif plant == 'Lettuce' %}{{ states('input_text.garden_seeds_lettuce') }}
            {% elif plant == 'Cucumber' %}{{ states('input_text.garden_seeds_cucumber') }}
            {% elif plant == 'Parsley' %}{{ states('input_text.garden_seeds_parsley') }}
            {% else %}
            {% endif %}
          options: >-
            {% set ns = namespace(vals=[]) %}
            {% for raw in csv.split(',') if csv | length > 0 %}
              {% set v = raw | trim %}
              {% if v | length > 0 and v not in ns.vals %}
                {% set ns.vals = ns.vals + [v] %}
              {% endif %}
            {% endfor %}
            {{ ns.vals }}
      - choose:
          - conditions: "{{ options | length > 0 }}"
            sequence:
              - service: input_select.set_options
                target:
                  entity_id: input_select.garden_seed_name
                data:
                  options: "{{ options }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.garden_seed_name
                data:
                  option: "{{ options[0] }}"
        default:
          - service: input_select.set_options
            target:
              entity_id: input_select.garden_seed_name
            data:
              options:
                - "Unknown Seed"
          - service: input_select.select_option
            target:
              entity_id: input_select.garden_seed_name
            data:
              option: "Unknown Seed"
    mode: single

  add_new_plant_option:
    alias: "Add New Plant Option"
    sequence:
      - variables:
          new_option: "{{ states('input_text.garden_new_plant_name') | trim }}"
          current_options: "{{ state_attr('input_select.garden_plant_name', 'options') | default([], true) }}"
      - choose:
          - conditions: "{{ new_option | length == 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Garden Assignment"
                  message: "Please enter a plant name before adding."
          - conditions: "{{ new_option in current_options }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.garden_plant_name
                data:
                  option: "{{ new_option }}"
        default:
          - service: input_select.set_options
            target:
              entity_id: input_select.garden_plant_name
            data:
              options: "{{ current_options + [new_option] }}"
          - service: input_select.select_option
            target:
              entity_id: input_select.garden_plant_name
            data:
              option: "{{ new_option }}"
          - service: input_text.set_value
            target:
              entity_id: input_text.garden_new_plant_name
            data:
              value: ""
          - service: script.refresh_seed_options_for_selected_plant
    mode: single

  add_new_seed_option:
    alias: "Add New Seed Option"
    sequence:
      - variables:
          new_option: "{{ states('input_text.garden_new_seed_name') | trim }}"
          current_options: "{{ state_attr('input_select.garden_seed_name', 'options') | default([], true) }}"
      - choose:
          - conditions: "{{ new_option | length == 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Garden Assignment"
                  message: "Please enter a seed name before adding."
          - conditions: "{{ new_option in current_options }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.garden_seed_name
                data:
                  option: "{{ new_option }}"
        default:
          - variables:
              plant: "{{ states('input_select.garden_plant_name') }}"
              new_csv: >-
                {% set base = current_options %}
                {% set merged = base + [new_option] %}
                {{ merged | join(',') }}
          - choose:
              - conditions: "{{ plant == 'Tomato' }}"
                sequence:
                  - service: input_text.set_value
                    target: { entity_id: input_text.garden_seeds_tomato }
                    data: { value: "{{ new_csv }}" }
              - conditions: "{{ plant == 'Basil' }}"
                sequence:
                  - service: input_text.set_value
                    target: { entity_id: input_text.garden_seeds_basil }
                    data: { value: "{{ new_csv }}" }
              - conditions: "{{ plant == 'Pepper' }}"
                sequence:
                  - service: input_text.set_value
                    target: { entity_id: input_text.garden_seeds_pepper }
                    data: { value: "{{ new_csv }}" }
              - conditions: "{{ plant == 'Lettuce' }}"
                sequence:
                  - service: input_text.set_value
                    target: { entity_id: input_text.garden_seeds_lettuce }
                    data: { value: "{{ new_csv }}" }
              - conditions: "{{ plant == 'Cucumber' }}"
                sequence:
                  - service: input_text.set_value
                    target: { entity_id: input_text.garden_seeds_cucumber }
                    data: { value: "{{ new_csv }}" }
              - conditions: "{{ plant == 'Parsley' }}"
                sequence:
                  - service: input_text.set_value
                    target: { entity_id: input_text.garden_seeds_parsley }
                    data: { value: "{{ new_csv }}" }
          - service: script.refresh_seed_options_for_selected_plant
          - service: input_select.select_option
            target:
              entity_id: input_select.garden_seed_name
            data:
              option: "{{ new_option }}"
          - service: input_text.set_value
            target:
              entity_id: input_text.garden_new_seed_name
            data:
              value: ""
    mode: single

  save_all_garden_pot_assignments:
    alias: "Save All Garden Pot Assignments"
    sequence:
      - service: persistent_notification.create
        data:
          title: "Garden Assignment"
          message: "Use 'Save Selected Sensor Assignment' per sensor to keep a clean explicit workflow."
    mode: single

automation:
  - id: "garden_refresh_seed_options_on_plant_change"
    alias: "Garden Refresh Seed Options On Plant Change"
    trigger:
      - platform: state
        entity_id: input_select.garden_plant_name
    action:
      - service: script.refresh_seed_options_for_selected_plant
    mode: restart

