    - name: "Garden Advice Summary"
      unique_id: "garden_advice_summary"
      state_topic: "homeassistant/garden/advice/summary"
      value_template: "{{ value_json.summary if value_json is defined else value }}"

rest_command:
  generate_garden_advice:
    url: "http://host.docker.internal:5064/api/garden/advice/generate"
    method: post
    content_type: "application/json"
    payload: '{"publishToMqtt": true}'

script:
  trigger_garden_advice_now:
    alias: "Trigger Garden Advice Now"
    sequence:
      - service: rest_command.generate_garden_advice
    mode: single

automation:
  - id: "garden_advice_summary_notification"
    alias: "Garden Advice Summary Notification"
    trigger:
      - platform: mqtt
        topic: "homeassistant/garden/advice/summary"
    action:
      - service: persistent_notification.create
        data:
          title: "Garden AI Summary"
          message: "{{ trigger.payload_json.summary if trigger.payload_json is defined else trigger.payload }}"
    mode: queued
