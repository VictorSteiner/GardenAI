mqtt:
  sensor:
    - name: "Mock Pot 1 Moisture"
      unique_id: "mock_pot1_moisture"
      state_topic: "homeassistant/test/mock-sensors/00000000000000000000000000000001"
      unit_of_measurement: "%"
      value_template: "{{ (value_json.soilMoisture if value_json is defined else 0) | float(0) }}"
    - name: "Mock Pot 1 Temperature"
      unique_id: "mock_pot1_temperature"
      state_topic: "homeassistant/test/mock-sensors/00000000000000000000000000000001"
      unit_of_measurement: "degC"
      value_template: "{{ (value_json.temperatureC if value_json is defined else 0) | float(0) }}"
    - name: "Mock Pot 1 Plant"
      unique_id: "mock_pot1_plant"
      state_topic: "homeassistant/test/mock-sensors/00000000000000000000000000000001"
      value_template: "{{ value_json.plantName if value_json is defined else '' }}"
    - name: "Mock Pot 1 Seed"
      unique_id: "mock_pot1_seed"
      state_topic: "homeassistant/test/mock-sensors/00000000000000000000000000000001"
      value_template: "{{ value_json.seedName if value_json is defined else '' }}"

