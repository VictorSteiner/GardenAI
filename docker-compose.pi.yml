version: "3.8"

services:
  api:
    image: ghcr.io/victorsteiner/gardenai-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    profiles:
      - ""

  frontend:
    image: ghcr.io/victorsteiner/gardenai-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles:
      - ""

  # Auto-update container images on the Pi
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for updates every 10 minutes (600 seconds)
      - WATCHTOWER_POLL_INTERVAL=600
      # Automatically restart containers with new images
      - WATCHTOWER_CLEANUP=true
    restart: unless-stopped
    profiles:
      - ""

