name: PR Auto-Merge

on:
  check_run:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-Merge on Checks Pass
    runs-on: ubuntu-latest
    if: github.event.check_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-Merge PR
        uses: ./.github/actions/auto-merge-pr
        with:
          pr_number: ${{ github.event.check_run.pull_requests[0].number }}

