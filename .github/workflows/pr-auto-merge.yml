name: PR Auto-Merge

# DISABLED: Auto-merge is currently disabled pending workflow trigger fixes
# The auto-merge action will be re-enabled once we resolve the race condition
# between workflow_run and PR merge availability.
#
# When re-enabling, use workflow_run event triggered after CI workflow completes.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-Merge on Checks Pass
    runs-on: ubuntu-latest
    # Disabled for now - require manual review before merge
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Manual Review Required
        shell: bash
        run: |
          echo "ℹ️ Auto-merge is currently disabled. Please manually approve and merge PRs."

