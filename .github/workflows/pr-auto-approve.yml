name: Bot Auto Approve

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto Approve Eligible PR
    if: github.event.label.name == 'bot-auto-approve'
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate and auto-approve pull request
        uses: ./.github/actions/auto-approve-pr
        with:
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}


