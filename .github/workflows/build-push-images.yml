name: Build and Push Docker Images

on:
  release:
    types: [published, prereleased]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    name: Build Backend (arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build Frontend (arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-installer-artifact:
    name: Package Pi USB Installer
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          bundle_dir="gardenai-pi-installer-${tag}"

          mkdir -p "${bundle_dir}/scripts"
          mkdir -p "${bundle_dir}/docs"
          mkdir -p "${bundle_dir}/mosquitto"

          cp scripts/install-pi.sh "${bundle_dir}/scripts/install-pi.sh"
          chmod +x "${bundle_dir}/scripts/install-pi.sh"

          cp docker-compose.yml "${bundle_dir}/docker-compose.yml"
          cp docker-compose.pi.yml "${bundle_dir}/docker-compose.pi.yml"
          cp .env.pi.example "${bundle_dir}/.env.pi.example"
          cp mosquitto/mosquitto.conf "${bundle_dir}/mosquitto/mosquitto.conf"
          cp docs/INSTALL_FROM_USB.md "${bundle_dir}/docs/INSTALL_FROM_USB.md"

          tar -czf "${bundle_dir}.tar.gz" "${bundle_dir}"
          sha256sum "${bundle_dir}.tar.gz" > "${bundle_dir}.sha256"

      - name: Upload installer assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gardenai-pi-installer-${{ github.ref_name }}.tar.gz
            gardenai-pi-installer-${{ github.ref_name }}.sha256

