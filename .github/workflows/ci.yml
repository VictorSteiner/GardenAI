name: CI

# This workflow has been split into separate workflows for efficiency:
# - backend-build.yml: Runs .NET build only when backend files change
# - frontend-build.yml: Runs Node build only when frontend files change
#
# This allows each to run independently without waiting for the other,
# and skips builds entirely if their respective paths haven't changed.

on:
  workflow_run:
    workflows: ["CI / Backend Build (.NET)", "CI / Frontend Build (Node)"]
    types: [completed]

permissions:
  contents: read

jobs:
  all-checks-passed:
    name: All CI Checks Passed
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: ✅ All checks passed
        run: echo "All CI checks completed successfully"


