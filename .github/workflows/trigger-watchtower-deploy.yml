name: Trigger Watchtower Deploy

on:
  release:
    types: [published, prereleased]

jobs:
  trigger-watchtower:
    name: Trigger Watchtower on Pi
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Watchtower webhook
        run: |
          # Watchtower listens on port 6969 for webhook triggers
          # This endpoint signals Watchtower to check for image updates immediately
          curl -X POST http://${{ secrets.PI_HOSTNAME }}:6969/v1/update \
            --connect-timeout 5 \
            --max-time 10 \
            --silent \
            --show-error \
            || echo "Watchtower webhook unavailable (Pi may be offline). Fallback to daily poll."
        continue-on-error: true

