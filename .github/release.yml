changelog:
  categories:
    - title: "Features"
      labels:
        - "feature"
        - "feat"
    - title: "Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "Dependencies"
      labels:
        - "dependencies"
    - title: "Refactors & Maintenance"
      labels:
        - "refactor"
        - "chore"
        - "ci"
    - title: "Documentation"
      labels:
        - "docs"
    - title: "Other Changes"
      labels:
        - "*"

