name: Auto-Merge PR
description: Automatically merges a pull request using rebase strategy when all relevant checks pass

inputs:
  pr_number:
    description: 'PR number to merge'
    required: false
    default: ${{ github.event.pull_request.number }}

runs:
  using: composite
  steps:
    - name: Determine PR Number
      id: pr
      shell: bash
      run: |
        PR_NUMBER="${{ inputs.pr_number }}"
        if [ -z "$PR_NUMBER" ]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
        fi
        if [ -z "$PR_NUMBER" ]; then
          PR_NUMBER="${{ github.event.check_run.pull_requests[0].number }}"
        fi
        echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

    - name: Detect Changed Areas
      id: changes
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_NUMBER=${{ steps.pr.outputs.number }}
        REPO=${{ github.repository }}
        
        # Get list of changed files
        FILES=$(gh pr diff $PR_NUMBER --repo $REPO --name-only)
        
        BACKEND_CHANGED=false
        FRONTEND_CHANGED=false
        
        echo "Changed files:"
        echo "$FILES"
        
        # Check if backend files changed
        if echo "$FILES" | grep -qE '(GardenAI\.|\.csproj|Directory\.Packages\.props)'; then
          BACKEND_CHANGED=true
          echo "? Backend changes detected"
        fi
        
        # Check if frontend files changed
        if echo "$FILES" | grep -qE 'frontend/'; then
          FRONTEND_CHANGED=true
          echo "? Frontend changes detected"
        fi
        
        # If no changes detected in either, allow merge
        if [ "$BACKEND_CHANGED" = false ] && [ "$FRONTEND_CHANGED" = false ]; then
          echo "?? No backend or frontend changes detected"
        fi
        
        echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
        echo "frontend_changed=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT

    - name: Verify All Checks Pass
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_NUMBER=${{ steps.pr.outputs.number }}
        REPO=${{ github.repository }}
        
        echo "Verifying all checks pass for PR #$PR_NUMBER..."
        
        # Get all checks for the PR
        CHECK_OUTPUT=$(gh pr checks $PR_NUMBER --repo $REPO 2>/dev/null)
        
        # Count passing and failing checks
        PASSING=$(echo "$CHECK_OUTPUT" | grep -c "?" || true)
        FAILING=$(echo "$CHECK_OUTPUT" | grep -c "?" || true)
        PENDING=$(echo "$CHECK_OUTPUT" | grep -c "?" || true)
        
        echo "Status: $PASSING passing, $FAILING failing, $PENDING pending"
        echo "$CHECK_OUTPUT"
        
        if [ "$FAILING" -gt 0 ] || [ "$PENDING" -gt 0 ]; then
          echo "? Not all checks have passed"
          exit 1
        fi
        
        echo "? All checks passed!"

    - name: Merge PR (Rebase)
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr merge ${{ steps.pr.outputs.number }} --rebase --auto --delete-branch

